<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teamo demasiado mi tiquita</title>

  <style>
    /* === Estilos Generales === */
    html { box-sizing: border-box; }
    *, *:before, *:after { box-sizing: inherit; }
    body, html {
      margin: 0; padding: 0; width: 100%;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      background-color: #fce4ec;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      min-height: 100vh; padding: 20px;
      overflow-x: hidden;
    }
    .main-content {
      display: flex; flex-direction: column;
      align-items: center;
      transition: opacity 0.5s ease-in-out, transform 0.5s ease-in-out;
    }
    .main-content.hidden {
      opacity: 0; transform: scale(0.9);
      pointer-events: none; position: absolute;
    }
    @keyframes heartbeat {
      0% { transform: scale(1); }
      10% { transform: scale(1.03); }
      20% { transform: scale(1); }
      30% { transform: scale(1.1); }
      45% { transform: scale(1); }
      100% { transform: scale(1); }
    }
    .heart-container {
      width: 90%; max-width: 300px;
      position: relative; cursor: pointer;
      animation: heartbeat 1.5s infinite ease-out;
      transition: transform 0.08s ease, filter 0.1s ease;
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1));
    }
    .heart-container.clicked {
      transform: scale(1.15) !important;
      filter: drop-shadow(0 6px 12px rgba(233, 30, 99, 0.4));
    }
    svg { width: 100%; height: auto; display: block; }
    .heart-fill {
      clip-path: inset(100% 0 0 0);
      transition: clip-path 0.1s ease-out;
    }
    .heart-outline {
      fill: none; stroke: #ad1457; stroke-width: 1.5;
    }
    .medals-container {
      margin-top: 20px; position: relative;
      width: 320px; height: 130px;
    }
    .plus-sign {
      font-size: 3em; color: #ad1457; font-weight: bold;
      position: absolute; left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      transition: opacity 0.3s ease;
      user-select: none;
    }
    .medal {
      width: 130px; height: 130px; object-fit: cover;
      position: absolute; top: 0;
      transition: transform 0.2s ease-out;
      user-select: none;
    }
    .medals-container .medal:first-of-type { left: 0; }
    .medals-container .medal:last-of-type { right: 0; }
    .card {
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      background-color: white; border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      padding: 30px; text-align: center;
      opacity: 0; transform: scale(0.9);
      transition: opacity 0.4s ease-in-out, transform 0.4s ease-in-out;
      width: 100%; max-width: 380px;
      z-index: 1001; position: relative;
    }
    .card.visible { display: flex; opacity: 1; transform: scale(1); }
    .close-button {
      position: absolute; top: 10px; right: 15px;
      font-size: 2.2em; color: #aaa; cursor: pointer;
      line-height: 1; transition: color 0.2s ease; z-index: 11;
    }
    .close-button:hover { color: #333; }
    .card img {
      width: 100%; max-width: 300px; height: auto;
      border-radius: 8px; margin-bottom: 20px;
    }
    .song-button {
      display: inline-block; padding: 12px 25px; margin-top: 10px;
      border-radius: 50px;
      background: linear-gradient(45deg, #ff8a80, #e91e63);
      color: white; text-decoration: none;
      font-weight: bold; font-size: 1.1em;
      box-shadow: 0 4px 15px rgba(233, 30, 99, 0.4);
      transition: transform 0.2s ease-out, box-shadow 0.2s ease-out;
      border: none;
    }
    .song-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(233, 30, 99, 0.5);
    }
    #confetti-container {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 999;
    }
    .confetti-piece {
      position: absolute; width: 15px; height: 26px;
    }
  </style>
</head>

  <div id="confetti-container"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script src="https://unpkg.com/gsap@3/dist/gsap.min.js"></script>

  <script>
    const mainContent = document.querySelector('.main-content');
    const heartContainer = document.querySelector('.heart-container');
    const heartFill = document.querySelector('.heart-fill');
    const loveCard = document.getElementById('love-card');
    const closeButton = document.getElementById('close-button');
    const medalLeft = document.querySelector('.medals-container .medal:first-of-type');
    const medalRight = document.querySelector('.medals-container .medal:last-of-type');
    const plusSign = document.querySelector('.plus-sign');
    const confettiContainer = document.getElementById('confetti-container');

    const CHARGE_TARGET = 50;
    const CLICK_INCREMENT = 5;
    const DECAY_RATE = 12;
    const UPDATE_INTERVAL = 50;

    let currentCharge = 0;
    let isComplete = false;
    let decayInterval;
    let confettiInterval;

    const confettiColors = ["#2ecc71", "#3498db", "#9b59b4", "#f1c40f", "#e67e22", "#e74c3c", "#f368e0"];

    function dropConfetti() {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.left = Math.random() * window.innerWidth + 'px';
      piece.style.top = '-20px';
      piece.style.backgroundColor = confettiColors[Math.floor(Math.random() * confettiColors.length)];
      confettiContainer.appendChild(piece);
      gsap.to(piece, {
        y: window.innerHeight + 20,
        rotation: (Math.random() - 0.5) * 1000,
        duration: Math.random() * 3 + 4,
        ease: 'none',
        onComplete: () => piece.remove()
      });
    }

    function startConfetti() {
      if (!confettiInterval) confettiInterval = setInterval(dropConfetti, 100);
    }
    function stopConfetti() {
      clearInterval(confettiInterval);
      confettiInterval = null;
      confettiContainer.innerHTML = '';
    }

    function updateMedalPositions() {
      const progress = currentCharge / CHARGE_TARGET;
      const movement = progress * 68;
      medalLeft.style.transform = `translateX(${movement}px)`;
      medalRight.style.transform = `translateX(${-movement}px)`;
      plusSign.style.opacity = 1 - progress;
    }

    function updateHeartVisual() {
      const insetTop = Math.max(0, 100 - (currentCharge / CHARGE_TARGET) * 100);
      heartFill.style.clipPath = `inset(${insetTop}% 0 0 0)`;
      updateMedalPositions();
    }

    function completeChallenge() {
      isComplete = true;
      clearInterval(decayInterval);
      heartFill.style.clipPath = `inset(0% 0 0 0)`;
      mainContent.classList.add('hidden');
      loveCard.classList.add('visible');
      startConfetti();
    }

    function decayCharge() {
      if (isComplete) return;
      currentCharge = Math.max(0, currentCharge - (DECAY_RATE * UPDATE_INTERVAL) / 1000);
      updateHeartVisual();
    }

    function resetGame() {
      isComplete = false;
      currentCharge = 0;
      stopConfetti();
      setTimeout(updateHeartVisual, 100);
      loveCard.classList.remove('visible');
      mainContent.classList.remove('hidden');
      clearInterval(decayInterval);
      decayInterval = setInterval(decayCharge, UPDATE_INTERVAL);
    }

    function handleInteraction() {
      if (isComplete) return;
      currentCharge = Math.min(CHARGE_TARGET, currentCharge + CLICK_INCREMENT);
      updateHeartVisual();

      heartContainer.classList.add('clicked');
      setTimeout(() => heartContainer.classList.remove('clicked'), 100);

      if (currentCharge >= CHARGE_TARGET) completeChallenge();
    }

    heartContainer.addEventListener('click', e => {
      e.stopPropagation();
      handleInteraction();
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !isComplete) {
        e.preventDefault();
        handleInteraction();
      }
    });

    closeButton.addEventListener('click', e => {
      e.stopPropagation();
      resetGame();
    });

    resetGame();
  </script>
